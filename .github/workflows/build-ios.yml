name: Build iOS IPA 

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-14 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install --include=dev

      - name: Build Web Code and Sync
        run: |
          # 1. สร้างโฟลเดอร์ ios ขึ้นมาใหม่ก่อน (ถ้ายังไม่มี)
          npx cap add ios || true

      # ✨ ย้ายมาอยู่ตรงนี้: ต้องรันหลังจากแตกโฟลเดอร์ ios เสร็จแล้ว แต่ต้องก่อนสั่ง sync
      - name: Generate App Icons
        run: |
          npx capacitor-assets generate --ios

      - name: Sync Project
        run: |
          # 2. ทำการซิงค์ข้อมูลและอัปเดตไฟล์ไอคอนเข้าสิทธิ์ระบบ Xcode
          npx cap sync ios

      - name: Compile iOS Project to .app
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package .app into .ipa (The Sideload Hack)
        run: |
          mkdir -p Payload
          cp -r $GITHUB_WORKSPACE/build/App.app Payload/
          zip -r KPT-kds.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPT-kds
          path: KPT-kds.ipa
